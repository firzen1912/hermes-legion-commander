# Multi-provider / multi-model council example.
#
# This shows three independent agents:
#   - codex_fast : OpenAI Codex CLI on a small, cheap model (generation legwork)
#   - claude_deep: Anthropic Claude Code on a strong model (assurance/evaluation)
#   - gemini     : a custom-runtime CLI from another provider
#
# Roles map to any configured agent. The key loop-engineering move is putting the
# evaluator (security_assurance) on a DIFFERENT model from the generator
# (prototyper), because a model reviewing its own output keeps its own blind
# spots. Swap models freely without touching code.

[council]
repo = "/absolute/path/to/target-repository"
state_dir = "../state/model-council"
research_dir = "../state/research"
roadmap_path = "docs/roadmap.md"
subagent_cap = 5   # weaker subagents the lead worker may spawn for grunt work (default 5; 0 disables)

# Generator on the fast model; evaluator on a different, stronger model.
[roles]
roadmap_plan_reviewer = "codex_fast"
researcher            = "codex_fast"
prototyper            = "codex_fast"   # generator
literature_reviewer   = "claude_deep"
code_polisher         = "claude_deep"
security_assurance    = "claude_deep"  # evaluator (different model from generator)

# Built-in runtime: command must launch `codex`.
[agents.codex_fast]
runtime = "codex-cli"
provider = "openai"
model = "gpt-5-mini"
effort = "low"
prompt_transport = "stdin"
output_format = "codex-jsonl"
command = ["codex", "{model_args}", "{effort_args}", "--sandbox", "workspace-write", "--ask-for-approval", "never", "--add-dir", "{context_dir}", "exec", "--json", "--output-last-message", "{output_file}", "-"]
timeout_seconds = 21600

# Built-in runtime: command must launch `claude`.
[agents.claude_deep]
runtime = "claude-code"
provider = "anthropic"
model = "claude-opus-4-8"
effort = "high"
prompt_transport = "stdin"
output_format = "claude-json"
command = ["claude", "{model_args}", "--output-format", "json", "-p", "{prompt}"]
timeout_seconds = 21600

# Custom runtime: any CLI works. The runtime id is free-form; because it is not a
# built-in runtime, no executable check is enforced (you own the command). Output
# is parsed by output_format, with a plain-text fallback, so a CLI that prints a
# final plain-text answer needs output_format = "text".
[agents.gemini]
runtime = "gemini-cli"
provider = "google"
model = "gemini-2.5-pro"
prompt_transport = "argument"
output_format = "text"
command = ["gemini", "-m", "{model}", "-p", "{prompt}"]
timeout_seconds = 21600

[research]
topics = [
  "heterogeneous UAV UGV robot swarms",
  "secure swarm coordination and zero trust",
]
literature_reviewer = "claude_deep"
