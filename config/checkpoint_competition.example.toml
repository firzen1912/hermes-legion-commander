[competition]
repo = "/absolute/path/to/target-repository"
plan = "docs/roadmap.md"
state_dir = "../state/checkpoint-competition"
base_ref = "HEAD"
branch_prefix = "legion-competition"
quota_wait = true
quota_retry_seconds = 900
quota_max_retry_seconds = 21600
massive_files = 25
massive_lines = 1500
checks = [["python", "-m", "pytest", "-q"]]
weights = { security = 0.35, correctness = 0.35, maintainability = 0.20, performance = 0.10 }

# Base native CLI definitions. Role-specific model and effort values below
# override these fields. Blank model values use the CLI's authenticated default.
[agents.gpt]
role = "Codex checkpoint competitor"
runtime = "codex-cli"
provider = "openai-codex"
model = ""
effort = "medium"
prompt_transport = "stdin"
output_format = "codex-jsonl"
capabilities = ["web-search", "read-files", "edit-files", "shell", "tests", "experiments", "citations"]
unset_env = ["OPENAI_BASE_URL", "OPENAI_API_BASE", "AZURE_OPENAI_ENDPOINT", "ANTHROPIC_BASE_URL", "ANTHROPIC_API_URL"]
command = ["codex", "{model_args}", "{effort_args}", "--sandbox", "workspace-write", "--ask-for-approval", "never", "--add-dir", "{context_dir}", "exec", "--json", "--output-last-message", "{output_file}", "-"]
timeout_seconds = 21600

[agents.claude]
role = "Claude Code checkpoint competitor"
runtime = "claude-code"
provider = "anthropic-claude-code"
model = ""
effort = "medium"
prompt_transport = "stdin"
output_format = "claude-json"
capabilities = ["web-search", "read-files", "edit-files", "shell", "tests", "experiments", "citations", "security-review"]
unset_env = ["OPENAI_BASE_URL", "OPENAI_API_BASE", "AZURE_OPENAI_ENDPOINT", "ANTHROPIC_BASE_URL", "ANTHROPIC_API_URL"]
command = ["claude", "-p", "Execute the complete task supplied on standard input.", "--input-format", "text", "--output-format", "json", "--permission-mode", "acceptEdits", "{model_args}", "{effort_args}", "--add-dir", "{context_dir}"]
timeout_seconds = 21600

# Both competitors execute every role. Set exact model IDs accepted by your
